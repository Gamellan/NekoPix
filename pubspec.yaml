name: nekopix
description: "NekoPix - Anime Wallpapers"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1

  # HTTP Client
  dio: ^5.4.0

  # Image Loading & Caching
  cached_network_image: ^3.3.1

  # Masonry/Staggered Grid Layout
  flutter_staggered_grid_view: ^0.7.0

  # Local Storage (Favorites)
  shared_preferences: ^2.2.3

  # Set as Wallpaper (Android)
  wallpaper_manager_flutter: ^1.0.1

  # File System / Temp Directory
  path_provider: ^2.1.2

  # Save Image to Gallery
  gal: ^2.3.2

  # Share Content
  share_plus: ^9.0.0

  # Open artist links
  url_launcher: ^6.3.0

  # Google AdMob
  google_mobile_ads: ^9.0.0

  # Loading Skeleton Shimmer
  shimmer: ^3.0.0

  # Smooth UI Animations
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: assets/icon/app_icon.jpg
  adaptive_icon_foreground: assets/icon/app_icon.jpg
  adaptive_icon_background: "#EAD1F6"
  adaptive_icon_foreground_inset: 24

flutter:
  uses-material-design: true
